name: .NET

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    name: Restore and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Itransition.csproj --disable-parallel

      - name: Build
        run: dotnet build Itransition.csproj --configuration Release --no-restore --maxcpucount:1 --disable-build-servers -p:UseSharedCompilation=false
